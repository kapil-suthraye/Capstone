<div class="upload-page">

    <h1>Upload Medical Record</h1>

    <div class="upload-card">

        <span class="material-symbols-rounded upload-icon">

            upload_file

        </span>

        <h2>

            {{progressText()}}

        </h2>

        <input

            type="file"

            accept=".pdf"

            (change)="onFileSelected($event)"

        >

        @if(uploading()){

        <div class="loader"></div>

        }

    </div>

</div>
