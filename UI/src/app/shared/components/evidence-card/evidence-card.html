<section class="supporting-evidence">

    <header>
        <div>
            <p class="eyebrow">Evidence trace</p>
            <h2>Retrieved clinical context</h2>
        </div>
        <!-- <span>{{result.supporting_evidence.length}} chunks</span> -->
    </header>

    @for(evidence of result.supporting_evidence; track evidence.chunk_id || evidence.page + evidence.heading){

        <article class="evidence-card">

            <div class="evidence-header">

                <span class="page">
                    <span class="material-symbols-rounded">description</span>
                    Page {{ evidence.page }}
                </span>

                <span class="heading">
                    {{ evidence.heading }}
                </span>

            </div>

            <!-- <p class="score">
                Retrieval score: {{ evidence.score || 0 }}
            </p> -->

            <div class="evidence-body">

                {{ evidence.evidence }}

            </div>

        </article>

    }

</section>
