<div class="supporting-evidence">

    <div
        class="evidence-card"
        *ngFor="let evidence of result.supporting_evidence">

        <div class="evidence-header">

            <span class="page">

                📄 Page {{ evidence.page }}

            </span>

            <span class="heading">

                {{ evidence.heading }}

            </span>

        </div>

        <div class="evidence-body">

            {{ evidence.evidence }}

        </div>

    </div>

</div>
