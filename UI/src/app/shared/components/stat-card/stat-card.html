<mat-card class="card" [ngClass]="color">

    <div class="top">

        <div class="icon">

            <span class="material-symbols-rounded">

                {{icon}}

            </span>

        </div>

        <div>

            <h4>{{title}}</h4>

            <h1>{{value}}</h1>

        </div>

    </div>

    <p>{{subtitle}}</p>

    <div class="progress">

        <div class="bar"></div>

    </div>

</mat-card>
